<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 64 64" fill="none">
  <title>lumina-forge</title>
  <defs>
    <radialGradient id="glow" cx="50%" cy="50%" r="50%">
      <stop offset="0%" stop-color="#F4C269" stop-opacity="0.9"/>
      <stop offset="60%" stop-color="#F4C269" stop-opacity="0.25"/>
      <stop offset="100%" stop-color="#F4C269" stop-opacity="0"/>
    </radialGradient>
    <linearGradient id="hammer" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#2A2F4A"/>
      <stop offset="100%" stop-color="#0B1025"/>
    </linearGradient>
    <linearGradient id="gem" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#FFE4A8"/>
      <stop offset="60%" stop-color="#F4C269"/>
      <stop offset="100%" stop-color="#C98F3A"/>
    </linearGradient>
  </defs>
  <rect width="64" height="64" rx="14" fill="#0B1025"/>
  <!-- soft glow behind gem -->
  <circle cx="32" cy="28" r="22" fill="url(#glow)"/>
  <!-- painterly particles -->
  <circle cx="13" cy="18" r="1.4" fill="#F4C269" opacity="0.8"/>
  <circle cx="51" cy="14" r="1" fill="#F4C269" opacity="0.6"/>
  <circle cx="50" cy="45" r="1.2" fill="#2CC4B4" opacity="0.7"/>
  <circle cx="14" cy="47" r="1" fill="#2CC4B4" opacity="0.5"/>
  <!-- hammer — group rotated 45° around (32, 32) -->
  <g transform="rotate(-30 32 32)">
    <!-- handle -->
    <rect x="29.5" y="30" width="5" height="24" rx="1.5" fill="url(#hammer)"/>
    <rect x="29.5" y="30" width="1.6" height="24" fill="#2CC4B4" opacity="0.35"/>
    <!-- head -->
    <rect x="16" y="18" width="32" height="14" rx="2.5" fill="url(#hammer)"/>
    <!-- rim light (teal edge) -->
    <rect x="16" y="18" width="2.5" height="14" rx="1" fill="#2CC4B4" opacity="0.55"/>
    <!-- gem inset -->
    <polygon points="32,20.5 36,25 32,29.5 28,25" fill="url(#gem)"/>
    <polygon points="32,20.5 36,25 32,25" fill="#FFE4A8" opacity="0.9"/>
    <polygon points="32,25 36,25 32,29.5" fill="#C98F3A" opacity="0.8"/>
    <!-- bright gem highlight -->
    <circle cx="30" cy="23" r="0.8" fill="#FFFFFF" opacity="0.9"/>
  </g>
</svg>

[project]
name = "lumina-forge-optimizer"
version = "0.8.2"
description = "Ranks Expedition 33 builds from the items a player has on hand."
readme = "README.md"
requires-python = ">=3.13"
license = { text = "MIT" }
authors = [{ name = "Léon Fievet" }]

dependencies = [
  "fastapi>=0.115",
  "httpx>=0.28",
  "pydantic>=2.10",
  "python-frontmatter>=1.1",
  "pyyaml>=6.0",
  "rich>=13.9",
  "typer>=0.15",
  "uvicorn[standard]>=0.32",
]

[project.scripts]
optimizer = "optimizer.cli:main"
lumina-forge-api = "optimizer.api.main:main"

[build-system]
requires = ["hatchling"]
build-backend = "hatchling.build"

[tool.hatch.build.targets.wheel]
packages = ["src/optimizer"]

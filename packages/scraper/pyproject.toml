[project]
name = "lumina-forge-scraper"
version = "0.1.0"
description = "Scrapes Expedition 33 guides and writes structured data into the Obsidian vault."
readme = "README.md"
requires-python = ">=3.13"
license = { text = "MIT" }
authors = [{ name = "Léon Fievet" }]

dependencies = [
  # HTTP & parsing deps arrive in Phase 2
  # "httpx>=0.28",
  # "beautifulsoup4>=4.12",
  # "lxml>=5.3",
  # "tenacity>=9.0",
]

[project.scripts]
scraper = "scraper.cli:main"

[build-system]
requires = ["hatchling"]
build-backend = "hatchling.build"

[tool.hatch.build.targets.wheel]
packages = ["src/scraper"]
